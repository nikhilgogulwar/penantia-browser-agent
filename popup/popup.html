<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px; min-height: 120px;
      background: #0f0f13; color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px; padding: 16px;
    }
    .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .logo-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #6366f1;
      box-shadow: 0 0 8px #6366f1;
    }
    .logo-text { font-weight: 600; font-size: 14px; color: #c7d2fe; }
    .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      transition: background 0.3s;
    }
    .connected    { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .disconnected { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
    .connecting   { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; }
    .status-text  { color: #9ca3af; }
    .url-row { margin-top: 10px; }
    .url-label { color: #6b7280; font-size: 11px; margin-bottom: 4px; }
    .url-input {
      width: 100%; padding: 5px 8px; border-radius: 5px;
      border: 1px solid #374151; background: #1f2937;
      color: #e5e7eb; font-size: 11px;
    }
    .save-btn {
      margin-top: 8px; width: 100%; padding: 6px;
      background: #4f46e5; color: #fff; border: none;
      border-radius: 5px; cursor: pointer; font-size: 12px;
      font-weight: 500;
    }
    .save-btn:hover { background: #6366f1; }
    .version { color: #4b5563; font-size: 10px; margin-top: 12px; text-align: right; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-text">Penantia Agent</span>
  </div>
  <div class="status-row">
    <div class="status-dot" id="dot"></div>
    <span class="status-text" id="status-text">Checking...</span>
  </div>
  <div class="url-row">
    <div class="url-label">Backend WebSocket URL</div>
    <input class="url-input" id="wsUrl" type="text" placeholder="wss://...">
    <button class="save-btn" id="saveBtn">Save & Reconnect</button>
  </div>
  <div class="version">v1.0.0</div>
  <script src="popup.js"></script>
</body>
</html>
